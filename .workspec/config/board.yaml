name: WorkSpec Demo Board
description: Reference implementation demo — a small auth/payments product
spec_version: 1.0
settings:
  card_fields:
    - id
    - title
    - type
    - priority
    - assignee
  # detail_display: how the item detail opens.
  # side-panel-vertical (default) | side-panel-horizontal | floating
  detail_display: side-panel-vertical
sort:
  fields:
    - created
    - updated
    - priority
  default:
    field: updated
    direction: desc
